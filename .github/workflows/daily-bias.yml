name: Daily Bias Pipeline

on:
  schedule:
    - cron: "15 23 * * *" # UTC 23:15 = 香港07:15，記錄今日模型預測
    # settle set早啲(22:15 HKT):GitHub cron實測會遲成~80分鐘,23:45嘅話
    # 會跨香港午夜,settle錯日兼讀到凌晨嘅假max(2026-07-23實際發生過)
    - cron: "15 14 * * *" # UTC 14:15 = 香港22:15，記錄今日實測+重計bias
  workflow_dispatch:
    inputs:
      mode:
        description: "forecast 或 settle"
        required: true
        default: "forecast"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 決定模式
        id: mode
        # ⚠️唔可以用「而家幾點」判斷:GitHub cron延遲過鐘(23:15排程00:07先行),
        # 曾令朝班全部錯行settle。github.event.schedule=觸發嗰條cron,延遲都唔變
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "15 23 * * *" ]; then
            echo "mode=forecast" >> $GITHUB_OUTPUT
          else
            echo "mode=settle" >> $GITHUB_OUTPUT
          fi

      - name: 執行
        run: node daily_log.js --mode=${{ steps.mode.outputs.mode }}

      - name: Commit記錄
        run: |
          git config user.name "weather-bot"
          git config user.email "actions@github.com"
          git add forecast_log*.csv bias.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: daily bias log (${{ steps.mode.outputs.mode }}) [skip ci]"
          git push
